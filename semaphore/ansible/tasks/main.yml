---
# Tasks to collect system information from VMs

- name: Gather system facts
  ansible.builtin.setup:
    gather_subset:
      - all
  register: system_facts

- name: Get system uptime
  ansible.builtin.command: uptime -p
  register: uptime_info
  changed_when: false

- name: Get CPU utilization
  ansible.builtin.shell: |
    top -bn1 | grep "Cpu(s)" | awk '{print $2}' | cut -d'%' -f1
  register: cpu_utilization
  changed_when: false

- name: Get detailed CPU info
  ansible.builtin.command: nproc
  register: cpu_cores
  changed_when: false

- name: Display collected system information
  ansible.builtin.debug:
    msg:
      - "============================================"
      - "HOST: {{ ansible_hostname }}"
      - "============================================"
      - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "Kernel: {{ ansible_kernel }}"
      - "Architecture: {{ ansible_architecture }}"
      - "--------------------------------------------"
      - "System Uptime: {{ uptime_info.stdout | default('N/A') }}"
      - "--------------------------------------------"
      - "CPU Cores: {{ cpu_cores.stdout }}"
      - "CPU Utilization: {{ cpu_utilization.stdout }}%"
      - "--------------------------------------------"
      - "Total Memory: {{ (ansible_memtotal_mb / 1024) | round(2) }} GB"
      - "Free Memory: {{ (ansible_memfree_mb / 1024) | round(2) }} GB"
      - "============================================"

- name: Ensure reports directory exists on local machine
  ansible.builtin.file:
    path: "{{ playbook_dir }}/reports"
    state: directory
    mode: '0755'
  delegate_to: localhost
  become: false
  run_once: true

- name: Save system info to JSON file on local machine
  ansible.builtin.copy:
    content: |
      {
        "hostname": "{{ ansible_hostname }}",
        "os": "{{ ansible_distribution }} {{ ansible_distribution_version }}",
        "kernel": "{{ ansible_kernel }}",
        "architecture": "{{ ansible_architecture }}",
        "uptime": "{{ uptime_info.stdout | default('N/A') }}",
        "cpu_cores": {{ cpu_cores.stdout }},
        "cpu_utilization": "{{ cpu_utilization.stdout }}%",
        "memory_total_gb": {{ (ansible_memtotal_mb / 1024) | round(2) }},
        "memory_free_gb": {{ (ansible_memfree_mb / 1024) | round(2) }},
        "gathered_at": "{{ ansible_date_time.iso8601 }}"
      }
    dest: "{{ playbook_dir }}/reports/{{ ansible_hostname }}_system_info.json"
    mode: '0644'
  delegate_to: localhost
  become: false

