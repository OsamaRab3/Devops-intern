---
# Converts the generated Zabbix HTML report to PDF and sends it via email.
# Uses wkhtmltopdf only (no Chrome/Chromium required).

- name: Export Zabbix Report to PDF and Send via Email
  hosts: zabbix_servers
  become: true
  gather_facts: false

  vars_files:
    - group_vars/all.yml

  vars:
    html_report: "{{ report_output_file | expanduser }}"
    pdf_report: "{{ report_output_file | expanduser | regex_replace('\\.html$', '.pdf') }}"
    email_recipient: "{{ smtp_from }}"

  tasks:

    - name: Install required packages
      package:
        name:
          - wkhtmltopdf
          - msmtp
        state: present

    - name: Check HTML report exists
      stat:
        path: "{{ html_report }}"
      register: html_stat

    - name: Fail if HTML report is missing
      fail:
        msg: "HTML report not found at {{ html_report }}. Run generate_report.yml first."
      when: not html_stat.stat.exists

    - name: Export HTML report to PDF
      shell: |
        TEMP_HTML="$(mktemp /tmp/zabbix_expanded_XXXXXX.html)"

        sed \
          -e 's/class="collapse host-collapse"/class="collapse host-collapse show"/g' \
          -e 's/class="collapse group-collapse"/class="collapse group-collapse show"/g' \
          "{{ html_report }}" > "$TEMP_HTML"

        wkhtmltopdf \
          --enable-local-file-access \
          --javascript-delay 1000 \
          -O Landscape \
          "$TEMP_HTML" "{{ pdf_report }}"

        rm -f "$TEMP_HTML"
      args:
        executable: /bin/bash
      register: pdf_result

    - name: Show PDF generation result
      debug:
        msg: "PDF generated successfully at {{ pdf_report }}"

    - name: Send PDF report via email
      shell: |
        FROM="{{ smtp_from }}"
        RECIPIENT="{{ email_recipient }}"
        SUBJECT="Zabbix Monitoring Report - $(date '+%Y-%m-%d')"
        BOUNDARY="----=_ZabbixReport_$(date +%s)"
        FILENAME="$(basename "{{ pdf_report }}")"

        {
          echo "From: Zabbix Monitor <${FROM}>"
          echo "To: ${RECIPIENT}"
          echo "Subject: ${SUBJECT}"
          echo "MIME-Version: 1.0"
          echo "Content-Type: multipart/mixed; boundary=\"${BOUNDARY}\""
          echo ""

          echo "--${BOUNDARY}"
          echo "Content-Type: text/plain; charset=UTF-8"
          echo ""

          echo "Please find the attached Zabbix Monitoring Report generated on $(date '+%Y-%m-%d %H:%M:%S')."
          echo ""

          echo "--${BOUNDARY}"
          echo "Content-Type: application/pdf"
          echo "Content-Disposition: attachment; filename=\"${FILENAME}\""
          echo "Content-Transfer-Encoding: base64"
          echo ""

          base64 "{{ pdf_report }}"

          echo ""
          echo "--${BOUNDARY}--"

        } | msmtp --account=default "$RECIPIENT"
      args:
        executable: /bin/bash
      register: email_result

    - name: Email delivery confirmation
      debug:
        msg: "Report emailed successfully to {{ email_recipient }}"
